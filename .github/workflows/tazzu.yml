name: 🤖 Tazzu Bot — Maldives News

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'

  # Manual trigger (already working for you)
  workflow_dispatch:

  # Temporary trigger — helps GitHub activate the cron schedule
  # You can remove this after 1-2 successful scheduled runs
  push:
    branches: [ main ]

  # Safety: prevent accidental runs on PRs
  pull_request:
    branches: [ main ]

# ── Prevent overlapping runs ──────────────────────────────────────────────────
concurrency:
  group: tazzu-bot-run
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  run-bot:
    name: Fetch & Notify
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit seen_articles.json

    steps:
      # 1. Checkout
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python setup
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the bot
      - name: 🚀 Run Tazzu Bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tazzu_bot.py

      # 5. Save updated seen_articles.json
      - name: 💾 Save seen articles
        run: |
          git config user.name  "tazzu-bot[bot]"
          git config user.email "tazzu-bot@users.noreply.github.com"
          git add seen_articles.json
          git diff --staged --quiet || \
            git commit -m "chore: update seen articles [skip ci]"
          git push