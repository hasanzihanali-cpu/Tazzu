name: 🤖 Tazzu Bot — Maldives News

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:           # allow manual trigger from Actions tab

# ── THIS WAS MISSING: without this, git push fails silently ──
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use the built-in token — write permission granted above
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tazzu Bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tazzu_bot.py

      - name: Save seen_articles.json back to repo
        run: |
          git config --global user.name  "tazzu-bot[bot]"
          git config --global user.email "tazzu-bot@users.noreply.github.com"
          git add seen_articles.json
          # Only commit if the file actually changed (avoids empty commits)
          git diff --cached --quiet || git commit -m "chore: update seen_articles [skip ci]"
          git push
