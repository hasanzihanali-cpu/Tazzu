name: 🤖 Tazzu Bot — Maldives News

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # Runs every 30 minutes  (GitHub minimum is 5 min, but 30 is reliable)
    - cron: '*/30 * * * *'

  # Manual trigger — useful for first-run testing
  workflow_dispatch:

# ── Prevent overlapping runs ──────────────────────────────────────────────────
concurrency:
  group: tazzu-bot-run
  cancel-in-progress: false   # finish current run before starting next

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  run-bot:
    name: Fetch & Notify
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit seen_articles.json back to repo

    steps:
      # 1. Checkout (with push credentials)
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python setup with pip cache for speed
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the bot
      - name: 🚀 Run Tazzu Bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tazzu_bot.py

      # 5. Commit updated seen_articles.json back to the repo
      #    [skip ci] in commit message prevents an infinite loop of Actions
      - name: 💾 Save seen articles
        run: |
          git config user.name  "tazzu-bot[bot]"
          git config user.email "tazzu-bot@users.noreply.github.com"
          git add seen_articles.json
          git diff --staged --quiet || \
            git commit -m "chore: update seen articles [skip ci]"
          git push
